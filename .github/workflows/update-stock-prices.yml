name: Update Stock Prices

on:
  schedule:
    # Every 30 min during US market hours (Mon-Fri, 9:30 AM - 4 PM ET = 13:30-20:00 UTC)
    - cron: '0,30 13-20 * * 1-5'
    # Once at 7 AM ET on weekdays to capture previous close
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stock prices
        run: |
          TICKERS=$(python3 -c "import json; d=json.load(open('data/assets.json')); print(' '.join(s['ticker'] for s in d['stocks']))")
          echo "{" > data/stock-prices.json
          FIRST=true
          for TICKER in $TICKERS; do
            PRICE=$(curl -sf -H "User-Agent: Mozilla/5.0" \
              "https://query1.finance.yahoo.com/v8/finance/chart/${TICKER}?interval=1d&range=1d" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['chart']['result'][0]['meta']['regularMarketPrice'])" 2>/dev/null)
            if [ -n "$PRICE" ]; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> data/stock-prices.json
              fi
              printf '  "%s": %s' "$TICKER" "$PRICE" >> data/stock-prices.json
            fi
            sleep 1
          done
          echo "" >> data/stock-prices.json
          echo "}" >> data/stock-prices.json
          echo "Updated at: $(date -u)"
          cat data/stock-prices.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock-prices.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update stock prices: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
