name: Update Stock Prices

on:
  schedule:
    # Every 30 min during US market hours (Mon-Fri, 9:30 AM - 4 PM ET = 13:30-20:00 UTC)
    - cron: '0,30 13-20 * * 1-5'
    # Once at 7 AM ET on weekdays to capture previous close
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch stock prices
        run: |
          set -euo pipefail
          python3 scripts/update_stock_prices.py
          echo "Updated at: $(date -u)"
          cat data/stock-prices.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock-prices.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update stock prices: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
